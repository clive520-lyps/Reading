<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雲端閱讀認證 - 學生端系統</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600;1,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F5F5F0; color: #141414; }
        .serif { font-family: 'Cormorant Garamond', serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        canvas { border: 2px dashed #e5e7eb; border-radius: 1.5rem; background-color: #f9fafb; cursor: crosshair; }
        .markdown-body h1 { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; }
        .markdown-body p { margin-bottom: 1rem; line-height: 1.625; color: #374151; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB9NJXQwdKweStTbATahldDgvtbuGclo34",
            authDomain: "test-reading-71839.firebaseapp.com",
            databaseURL: "https://test-reading-71839-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "test-reading-71839",
            storageBucket: "test-reading-71839.firebasestorage.app",
            messagingSenderId: "499192051513",
            appId: "1:499192051513:web:717a1276cc6dfeed995ae8",
            measurementId: "G-SCPBVK0XYX"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Expose to window for React
        window.fb = { db, ref, set, get, push, onValue };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Components ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const wrapperRef = useRef(null);
            
            useEffect(() => {
                if (window.lucide && wrapperRef.current) {
                    // 手動建立一個 i 標籤供 Lucide 替換，這樣 React 就不會追蹤這個節點
                    wrapperRef.current.innerHTML = `<i data-lucide="${name}" class="${className}" style="width: ${size}px; height: ${size}px; display: block;"></i>`;
                    try {
                        lucide.createIcons({
                            root: wrapperRef.current
                        });
                    } catch (e) {
                        console.error("Lucide icon creation failed", e);
                    }
                }
            }, [name, size, className]);

            // React 只管理這個外層 span，內部的內容由 useEffect 手動控制
            return <span ref={wrapperRef} className="inline-flex items-center justify-center" style={{ width: size, height: size }}></span>;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('login');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [fbReady, setFbReady] = useState(false);

            useEffect(() => {
                const checkFb = setInterval(() => {
                    if (window.fb && window.fb.db) {
                        setFbReady(true);
                        clearInterval(checkFb);
                    }
                }, 100);
                return () => clearInterval(checkFb);
            }, []);

            const handleLogin = async (studentId, pass) => {
                if (!window.fb) return;
                setLoading(true);
                setError(null);
                try {
                    const studentRef = window.fb.ref(window.fb.db, `students/${studentId}`);
                    const snapshot = await window.fb.get(studentRef);
                    if (snapshot.exists() && snapshot.val().password === pass) {
                        setUser(snapshot.val());
                        setView('dashboard');
                    } else {
                        setError('學號或密碼錯誤');
                    }
                } catch (err) {
                    setError('登入失敗');
                } finally {
                    setLoading(false);
                }
            };

            const handleLogout = () => {
                setUser(null);
                setView('login');
            };

            if (!fbReady) return (
                <div className="flex flex-col items-center justify-center min-h-screen p-4">
                    <div className="w-16 h-16 border-4 border-[#5A5A40] border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p className="text-gray-500 font-medium">系統初始化中...</p>
                </div>
            );

            if (view === 'login') return <LoginPortal onLogin={handleLogin} loading={loading} error={error} />;
            return <StudentDashboard user={user} onLogout={handleLogout} />;
        };

        const LoginPortal = ({ onLogin, loading, error }) => {
            const [studentId, setStudentId] = useState('');
            const [password, setPassword] = useState('');

            return (
                <div className="flex flex-col items-center justify-center min-h-screen p-4">
                    <div className="w-full max-w-md bg-white rounded-[2rem] shadow-2xl overflow-hidden border border-black/5">
                        <div className="p-10">
                            <div className="flex justify-center mb-8">
                                <div className="w-20 h-20 bg-[#5A5A40] rounded-3xl flex items-center justify-center text-white shadow-lg shadow-[#5A5A40]/30">
                                    <Icon name="book-open" size={40} />
                                </div>
                            </div>
                            <h1 className="text-3xl font-bold text-center mb-2 serif">學生端登入</h1>
                            <p className="text-center text-gray-500 text-sm mb-10">開啟您的閱讀認證之旅</p>

                            {error && (
                                <div className="mb-6 p-4 bg-red-50 text-red-600 text-sm rounded-2xl border border-red-100 flex items-center gap-2">
                                    <Icon name="alert-circle" size={18} />
                                    {error}
                                </div>
                            )}

                            <form onSubmit={(e) => { e.preventDefault(); onLogin(studentId, password); }} className="space-y-6">
                                <div>
                                    <label className="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 ml-1">學生學號</label>
                                    <input 
                                        type="text" 
                                        value={studentId}
                                        onChange={(e) => setStudentId(e.target.value)}
                                        className="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-[#5A5A40] outline-none transition-all"
                                        placeholder="S123456"
                                        required
                                    />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 ml-1">密碼</label>
                                    <input 
                                        type="password" 
                                        value={password}
                                        onChange={(e) => setPassword(e.target.value)}
                                        className="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-[#5A5A40] outline-none transition-all"
                                        placeholder="預設 4 碼數字"
                                        required
                                    />
                                </div>
                                <button 
                                    disabled={loading}
                                    className="w-full py-4 bg-[#5A5A40] text-white rounded-2xl font-bold text-lg hover:bg-[#4A4A30] shadow-xl shadow-[#5A5A40]/20 transition-all flex items-center justify-center gap-2 disabled:opacity-50"
                                >
                                    {loading ? <Icon name="loader-2" className="animate-spin" /> : '登入系統'}
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            );
        };

        const StudentDashboard = ({ user, onLogout }) => {
            const [articles, setArticles] = useState([]);
            const [records, setRecords] = useState([]);
            const [selectedArticle, setSelectedArticle] = useState(null);
            const [selectedRecord, setSelectedRecord] = useState(null);
            const [view, setView] = useState('list');

            useEffect(() => {
                const articlesRef = window.fb.ref(window.fb.db, 'articles');
                const unsubscribeArticles = window.fb.onValue(articlesRef, (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        const list = Object.entries(data).map(([id, val]) => ({ id, ...val }));
                        setArticles(list);
                    }
                });

                const recordsRef = window.fb.ref(window.fb.db, 'records');
                const unsubscribeRecords = window.fb.onValue(recordsRef, (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        const list = Object.entries(data)
                            .map(([id, val]) => ({ id, ...val }))
                            .filter(r => r.studentId === user.id)
                            .sort((a, b) => b.timestamp - a.timestamp);
                        setRecords(list);
                    }
                });

                return () => {
                    unsubscribeArticles();
                    unsubscribeRecords();
                };
            }, [user.id]);

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="bg-white border-b border-black/5 px-8 py-5 flex justify-between items-center sticky top-0 z-50 backdrop-blur-md bg-white/90">
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 bg-[#5A5A40] rounded-2xl flex items-center justify-center text-white shadow-lg shadow-[#5A5A40]/20">
                                <Icon name="book-open" size={24} />
                            </div>
                            <div>
                                <h2 className="font-bold text-xl serif">雲端閱讀認證</h2>
                                <p className="text-xs text-gray-400">歡迎，{user.name} 同學！</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-6">
                            <nav className="hidden md:flex items-center bg-gray-100 p-1.5 rounded-2xl">
                                <button 
                                    onClick={() => setView('list')}
                                    className={`px-6 py-2.5 rounded-xl text-sm font-bold transition-all ${view === 'list' ? "bg-white shadow-md text-[#5A5A40]" : "text-gray-500 hover:text-gray-800"}`}
                                >
                                    文章列表
                                </button>
                                <button 
                                    onClick={() => setView('results')}
                                    className={`px-6 py-2.5 rounded-xl text-sm font-bold transition-all ${view === 'results' ? "bg-white shadow-md text-[#5A5A40]" : "text-gray-500 hover:text-gray-800"}`}
                                >
                                    我的成績
                                </button>
                            </nav>
                            <button onClick={onLogout} className="p-3 bg-gray-50 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-2xl transition-all">
                                <Icon name="log-out" size={22} />
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 p-8 max-w-6xl mx-auto w-full">
                        {view === 'list' && (
                            <div className="space-y-12">
                                <div className="bg-[#5A5A40] text-white p-12 rounded-[3rem] shadow-2xl relative overflow-hidden">
                                    <div className="relative z-10">
                                        <h1 className="text-5xl font-bold serif mb-6">今天想讀什麼？</h1>
                                        <p className="text-white/80 text-lg max-w-xl leading-relaxed">選擇一篇文章開始你的閱讀冒險，完成測驗後還能獲得 AI 老師的專屬回饋喔！</p>
                                    </div>
                                    <div className="absolute right-[-40px] bottom-[-40px] text-white/10 opacity-20">
                                        <Icon name="book-open" size={300} />
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                    {articles.map((a) => (
                                        <div key={a.id} className="bg-white p-10 rounded-[2.5rem] border border-black/5 shadow-sm hover:shadow-xl hover:-translate-y-2 transition-all duration-300 flex flex-col">
                                            <h3 className="text-2xl font-bold mb-6 serif line-clamp-2 leading-tight">{a.title}</h3>
                                            <p className="text-sm text-gray-500 line-clamp-4 mb-10 flex-1 leading-relaxed">{a.content}</p>
                                            <button 
                                                onClick={() => { setSelectedArticle(a); setView('quiz'); }}
                                                className="w-full py-4 bg-[#5A5A40] text-white rounded-2xl font-bold hover:bg-[#4A4A30] shadow-lg shadow-[#5A5A40]/20 transition-all flex items-center justify-center gap-2"
                                            >
                                                開始閱讀與測驗
                                                <Icon name="chevron-right" size={20} />
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'results' && (
                            <div className="space-y-10">
                                <div className="flex justify-between items-end">
                                    <div>
                                        <h2 className="text-4xl font-bold serif mb-2">我的測驗紀錄</h2>
                                        <p className="text-gray-400">回顧您的學習歷程與 AI 老師的回饋</p>
                                    </div>
                                    <button onClick={() => setView('list')} className="px-6 py-3 bg-white rounded-2xl text-sm font-bold text-[#5A5A40] border border-black/5 shadow-sm hover:shadow-md transition-all">返回文章列表</button>
                                </div>
                                
                                <div className="grid grid-cols-1 gap-6">
                                    {records.length > 0 ? records.map((r) => (
                                        <div key={r.id} className="bg-white p-8 rounded-[2rem] border border-black/5 shadow-sm hover:shadow-md transition-all flex items-center justify-between">
                                            <div className="flex items-center gap-6">
                                                <div className={`w-16 h-16 rounded-3xl flex items-center justify-center shadow-inner ${r.graded ? "bg-green-50 text-green-600" : "bg-amber-50 text-amber-600"}`}>
                                                    {r.graded ? <Icon name="check-circle" size={32} /> : <Icon name="loader-2" size={32} className="animate-spin" />}
                                                </div>
                                                <div>
                                                    <h4 className="font-bold text-xl mb-1">{articles.find(a => a.id === r.articleId)?.title || '未知文章'}</h4>
                                                    <p className="text-sm text-gray-400 flex items-center gap-2">
                                                        <Icon name="calendar" size={14} />
                                                        {new Date(r.timestamp).toLocaleString()}
                                                    </p>
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-10">
                                                <div className="text-right">
                                                    <p className="text-xs text-gray-400 uppercase font-bold tracking-widest mb-1">總分</p>
                                                    <p className="text-4xl font-bold text-[#5A5A40]">{r.graded ? r.score : '--'}</p>
                                                </div>
                                                <button 
                                                    onClick={() => { setSelectedRecord(r); setView('detail'); }}
                                                    className="px-8 py-3.5 bg-[#5A5A40] text-white rounded-2xl font-bold shadow-lg shadow-[#5A5A40]/20 hover:bg-[#4A4A30] transition-all"
                                                >
                                                    查看詳情
                                                </button>
                                            </div>
                                        </div>
                                    )) : (
                                        <div className="py-32 text-center bg-white rounded-[3rem] border-2 border-dashed border-gray-200">
                                            <div className="w-20 h-20 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-6 text-gray-300">
                                                <Icon name="inbox" size={40} />
                                            </div>
                                            <p className="text-gray-400 text-lg">尚無測驗紀錄，快去閱讀文章吧！</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {view === 'quiz' && <QuizInterface article={selectedArticle} user={user} onBack={() => setView('list')} />}

                        {view === 'detail' && selectedRecord && (
                            <div className="max-w-4xl mx-auto space-y-10">
                                <button onClick={() => setView('results')} className="text-gray-500 hover:text-gray-800 flex items-center gap-2 font-bold">
                                    <Icon name="chevron-left" size={20} />
                                    返回成績列表
                                </button>
                                
                                <div className="bg-white rounded-[3.5rem] p-12 border border-black/5 shadow-2xl space-y-12">
                                    <div className="flex justify-between items-start border-b border-gray-100 pb-10">
                                        <div>
                                            <h2 className="text-4xl font-bold serif mb-3">{articles.find(a => a.id === selectedRecord.articleId)?.title}</h2>
                                            <p className="text-gray-400 flex items-center gap-2">
                                                <Icon name="clock" size={16} />
                                                測驗時間：{new Date(selectedRecord.timestamp).toLocaleString()}
                                            </p>
                                        </div>
                                        <div className="bg-gray-50 px-10 py-6 rounded-[2rem] border border-gray-100 text-center shadow-inner">
                                            <div className="text-6xl font-bold text-[#5A5A40] mb-1">{selectedRecord.graded ? selectedRecord.score : '--'}</div>
                                            <div className="text-xs text-gray-400 uppercase font-bold tracking-widest">總分</div>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                                        <div className="space-y-8">
                                            <div className="bg-gray-50 p-8 rounded-[2.5rem] border border-gray-100">
                                                <h4 className="font-bold mb-6 flex items-center gap-3 text-sm uppercase tracking-widest text-gray-400">
                                                    <Icon name="pen-tool" size={18} /> 我的問答作答
                                                </h4>
                                                <div className="space-y-6">
                                                    {Object.entries(selectedRecord.answersSA || {}).map(([id, ans]) => (
                                                        <div key={id} className="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                                                            <p className="text-gray-700 leading-relaxed">{ans}</p>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                        <div className="space-y-8">
                                            <div className="bg-gray-50 p-8 rounded-[2.5rem] border border-gray-100">
                                                <h4 className="font-bold mb-6 flex items-center gap-3 text-sm uppercase tracking-widest text-gray-400">
                                                    <Icon name="image" size={18} /> 我的塗鴉成果
                                                </h4>
                                                <div className="bg-white rounded-2xl aspect-video overflow-hidden border border-gray-100 shadow-sm flex items-center justify-center">
                                                    {selectedRecord.drawingBase64 ? (
                                                        <img src={selectedRecord.drawingBase64} alt="My Drawing" className="w-full h-full object-contain" />
                                                    ) : (
                                                        <div className="text-gray-300 text-sm italic">無塗鴉紀錄</div>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="pt-10 border-t border-gray-100">
                                        <h4 className="text-2xl font-bold serif mb-6 flex items-center gap-3">
                                            <Icon name="sparkles" className="text-[#5A5A40]" size={28} /> 
                                            AI 老師的回饋與建議
                                        </h4>
                                        {selectedRecord.graded ? (
                                            <div className="bg-[#5A5A40]/5 p-10 rounded-[2.5rem] border border-[#5A5A40]/10 leading-relaxed text-gray-700 text-lg shadow-inner italic">
                                                "{selectedRecord.feedback}"
                                            </div>
                                        ) : (
                                            <div className="bg-amber-50 p-10 rounded-[2.5rem] border border-amber-100 text-amber-700 flex items-center gap-4 shadow-inner">
                                                <Icon name="loader-2" className="animate-spin" size={24} />
                                                <span className="font-bold">老師正在批改中，請稍後再回來查看成績喔！</span>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const QuizInterface = ({ article, user, onBack }) => {
            const [step, setStep] = useState('reading');
            const [questions, setQuestions] = useState(null);
            const [answersTF, setAnswersTF] = useState({});
            const [answersMC, setAnswersMC] = useState({});
            const [answersSA, setAnswersSA] = useState({});
            const [isSubmitting, setIsSubmitting] = useState(false);
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);

            useEffect(() => {
                const fetchQuestions = async () => {
                    if (!article || !article.id) {
                        setQuestions({ tf: [], mc: [], sa: [], dr: [] });
                        return;
                    }
                    try {
                        // Set a timeout for the fetch
                        const timeout = setTimeout(() => {
                            if (!questions) {
                                setQuestions({ tf: [], mc: [], sa: [], dr: [] });
                            }
                        }, 5000);

                        const tf = await window.fb.get(window.fb.ref(window.fb.db, `questions_tf/${article.id}`));
                        const mc = await window.fb.get(window.fb.ref(window.fb.db, `questions_mc/${article.id}`));
                        const sa = await window.fb.get(window.fb.ref(window.fb.db, `questions_sa/${article.id}`));
                        const dr = await window.fb.get(window.fb.ref(window.fb.db, `questions_dr/${article.id}`));
                        
                        clearTimeout(timeout);
                        setQuestions({
                            tf: tf.val() || [],
                            mc: mc.val() || [],
                            sa: sa.val() || [],
                            dr: dr.val() || []
                        });
                    } catch (err) {
                        console.error("Fetch questions failed:", err);
                        setQuestions({ tf: [], mc: [], sa: [], dr: [] });
                    }
                };
                fetchQuestions();
            }, [article?.id]);

            const handleSubmit = async () => {
                setIsSubmitting(true);
                try {
                    const drawingBase64 = canvasRef.current?.toDataURL() || '';
                    const recordRef = window.fb.push(window.fb.ref(window.fb.db, 'records'));
                    await window.fb.set(recordRef, {
                        timestamp: Date.now(),
                        studentId: user.id,
                        articleId: article.id,
                        answersTF,
                        answersMC,
                        answersSA,
                        drawingBase64,
                        graded: false,
                        score: 0,
                        feedback: ''
                    });
                    alert('提交成功！請等待老師批改。');
                    onBack();
                } catch (err) {
                    alert('提交失敗');
                } finally {
                    setIsSubmitting(false);
                }
            };

            const startDrawing = (e) => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.strokeStyle = '#5A5A40';
                setIsDrawing(true);
                const rect = canvas.getBoundingClientRect();
                ctx.beginPath();
                ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
            };

            const draw = (e) => {
                if (!isDrawing) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const rect = canvas.getBoundingClientRect();
                ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
                ctx.stroke();
            };

            if (!questions) return <div className="flex items-center justify-center py-40"><Icon name="loader-2" className="animate-spin text-[#5A5A40]" size={64} /></div>;

            return (
                <div className="max-w-4xl mx-auto">
                    <div className="flex justify-between items-center mb-10">
                        <button onClick={onBack} className="text-gray-500 hover:text-gray-800 flex items-center gap-2 font-bold">
                            <Icon name="chevron-left" size={20} />
                            返回列表
                        </button>
                        <div className="flex gap-3">
                            <div className={`w-4 h-4 rounded-full transition-all ${step === 'reading' ? "bg-[#5A5A40] scale-125 shadow-lg shadow-[#5A5A40]/30" : "bg-gray-200"}`} />
                            <div className={`w-4 h-4 rounded-full transition-all ${step === 'quiz' ? "bg-[#5A5A40] scale-125 shadow-lg shadow-[#5A5A40]/30" : "bg-gray-200"}`} />
                        </div>
                    </div>

                    {step === 'reading' ? (
                        <div className="bg-white p-16 rounded-[4rem] shadow-2xl border border-black/5">
                            <h1 className="text-4xl font-bold serif mb-12 text-center leading-tight">{article.title}</h1>
                            <div className="markdown-body mb-16 text-xl leading-loose">
                                {(article.content || '').split('\n').map((p, i) => <p key={i}>{p}</p>)}
                            </div>
                            <button 
                                onClick={() => setStep('quiz')}
                                className="w-full py-5 bg-[#5A5A40] text-white rounded-[2rem] font-bold text-xl hover:bg-[#4A4A30] shadow-2xl shadow-[#5A5A40]/30 transition-all flex items-center justify-center gap-3"
                            >
                                我讀完了，開始測驗！
                                <Icon name="arrow-right" size={24} />
                            </button>
                        </div>
                    ) : (
                        <div className="space-y-16 pb-32">
                            {questions.tf.length > 0 && (
                                <section className="bg-white p-12 rounded-[3rem] border border-black/5 shadow-xl">
                                    <h3 className="text-2xl font-bold mb-10 serif flex items-center gap-3">
                                        <Icon name="check-circle" className="text-green-500" size={28} /> 是非題
                                    </h3>
                                    <div className="space-y-8">
                                        {questions.tf.map((q, idx) => (
                                            <div key={idx} className="p-8 bg-gray-50 rounded-[2rem] flex items-center justify-between gap-8 border border-gray-100">
                                                <p className="font-bold text-lg leading-relaxed">{idx + 1}. {q.content}</p>
                                                <div className="flex gap-4 shrink-0">
                                                    <button 
                                                        onClick={() => setAnswersTF({...answersTF, [idx]: true})}
                                                        className={`w-16 h-16 rounded-2xl border-2 font-bold text-2xl transition-all ${answersTF[idx] === true ? "bg-green-500 text-white border-green-500 shadow-lg shadow-green-500/30" : "bg-white border-gray-200 text-gray-400 hover:border-green-200"}`}
                                                    >
                                                        O
                                                    </button>
                                                    <button 
                                                        onClick={() => setAnswersTF({...answersTF, [idx]: false})}
                                                        className={`w-16 h-16 rounded-2xl border-2 font-bold text-2xl transition-all ${answersTF[idx] === false ? "bg-red-500 text-white border-red-500 shadow-lg shadow-red-500/30" : "bg-white border-gray-200 text-gray-400 hover:border-red-200"}`}
                                                    >
                                                        X
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            )}

                            {questions.mc.length > 0 && (
                                <section className="bg-white p-12 rounded-[3rem] border border-black/5 shadow-xl">
                                    <h3 className="text-2xl font-bold mb-10 serif flex items-center gap-3">
                                        <Icon name="list" className="text-blue-500" size={28} /> 選擇題
                                    </h3>
                                    <div className="space-y-12">
                                        {questions.mc.map((q, idx) => (
                                            <div key={idx} className="space-y-6">
                                                <p className="font-bold text-lg leading-relaxed">{idx + 1}. {q.content}</p>
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                    {q.options.map((opt, optIdx) => (
                                                        <button 
                                                            key={optIdx}
                                                            onClick={() => setAnswersMC({...answersMC, [idx]: optIdx})}
                                                            className={`p-6 rounded-2xl border-2 text-left transition-all font-medium ${answersMC[idx] === optIdx ? "bg-blue-500 text-white border-blue-500 shadow-lg shadow-blue-500/30" : "bg-gray-50 border-gray-100 hover:bg-white hover:border-blue-200"}`}
                                                        >
                                                            <span className="mr-3 opacity-50 font-mono">{String.fromCharCode(65 + optIdx)}.</span>
                                                            {opt}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            )}

                            {questions.sa.length > 0 && (
                                <section className="bg-white p-12 rounded-[3rem] border border-black/5 shadow-xl">
                                    <h3 className="text-2xl font-bold mb-10 serif flex items-center gap-3">
                                        <Icon name="pen-tool" className="text-amber-500" size={28} /> 問答題
                                    </h3>
                                    <div className="space-y-12">
                                        {questions.sa.map((q, idx) => (
                                            <div key={idx} className="space-y-4">
                                                <p className="font-bold text-lg leading-relaxed">{idx + 1}. {q.content}</p>
                                                <textarea 
                                                    rows={5}
                                                    placeholder="請輸入您的回答..."
                                                    value={answersSA[idx] || ''}
                                                    onChange={(e) => setAnswersSA({...answersSA, [idx]: e.target.value})}
                                                    className="w-full p-8 bg-gray-50 border-2 border-gray-100 rounded-[2rem] outline-none focus:ring-4 focus:ring-[#5A5A40]/10 focus:border-[#5A5A40] transition-all text-lg"
                                                />
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            )}

                            {questions.dr.length > 0 && (
                                <section className="bg-white p-12 rounded-[3rem] border border-black/5 shadow-xl">
                                    <h3 className="text-2xl font-bold mb-10 serif flex items-center gap-3">
                                        <Icon name="palette" className="text-purple-500" size={28} /> 塗鴉題
                                    </h3>
                                    <div className="space-y-8">
                                        {questions.dr.map((q, idx) => (
                                            <div key={idx} className="space-y-6">
                                                <p className="font-bold text-lg leading-relaxed">{idx + 1}. {q.content}</p>
                                                <div className="relative group">
                                                    <canvas 
                                                        ref={canvasRef}
                                                        width={800}
                                                        height={450}
                                                        onMouseDown={startDrawing}
                                                        onMouseMove={draw}
                                                        onMouseUp={() => setIsDrawing(false)}
                                                        onMouseLeave={() => setIsDrawing(false)}
                                                        className="w-full h-auto shadow-inner"
                                                    />
                                                    <button 
                                                        onClick={() => {
                                                            const ctx = canvasRef.current?.getContext('2d');
                                                            ctx?.clearRect(0, 0, 800, 450);
                                                        }}
                                                        className="absolute bottom-6 right-6 p-4 bg-white rounded-2xl shadow-xl text-gray-400 hover:text-red-500 transition-all hover:scale-110 active:scale-95"
                                                    >
                                                        <Icon name="trash-2" size={24} />
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            )}

                            <button 
                                disabled={isSubmitting}
                                onClick={handleSubmit}
                                className="w-full py-6 bg-[#5A5A40] text-white rounded-[2.5rem] font-bold text-2xl hover:bg-[#4A4A30] shadow-2xl shadow-[#5A5A40]/40 transition-all flex items-center justify-center gap-4 disabled:opacity-50"
                            >
                                {isSubmitting ? <Icon name="loader-2" className="animate-spin" size={32} /> : <Icon name="send" size={28} />}
                                {isSubmitting ? '正在提交結果...' : '完成測驗，提交結果'}
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
